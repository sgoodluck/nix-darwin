# Hyprlock configuration - lock screen
# Modus Vivendi Tinted color scheme

background {
    monitor =
    path = ~/nix/assets/shaded.png
    blur_passes = 3
    blur_size = 8
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(2fafffee)
    inner_color = rgba(1d2235ee)
    font_color = rgba(ffffffee)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(ffffffee)
    font_size = 64
    font_family = SauceCodePro Nerd Font
    position = 0, 80
    halign = center
    valign = center
}
