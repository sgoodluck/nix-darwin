# Hyprland configuration — ThinkPad X1 Nano Gen 3
# Modus Vivendi Tinted colorscheme to match terminal/nvim/zed

################
### MONITORS ###
################

monitor = eDP-1, preferred, auto, 1.25
monitor = DP-3, preferred, auto, 2

# Lid switch — disable internal display when closed
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, preferred, auto, 1.25"

###################
### MY PROGRAMS ###
###################

$terminal = ghostty
$fileManager = $terminal -e ranger
$menu = wofi --show drun
$browser = zen

#################
### AUTOSTART ###
#################

exec-once = nm-applet &
exec-once = waybar &
exec-once = hyprpaper &
exec-once = swaync &
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

#############################
### ENVIRONMENT VARIABLES ###
#############################

xwayland {
  force_zero_scaling = true
}

env = GDK_SCALE,1
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    # Modus Vivendi Tinted colors
    col.active_border = rgba(2fafffe0) rgba(44bc44e0) 45deg
    col.inactive_border = rgba(4f5666aa)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.95

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.17
    }
}

animations {
    enabled = true
    bezier = snappy, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, snappy
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 8, default
    animation = borderangle, 1, 6, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

### PROGRAMS ###
bind = $mainMod, return, exec, $terminal
bind = $mainMod, space, exec, $menu
bind = $mainMod SHIFT, return, exec, $browser
bind = $mainMod, f, exec, $fileManager

### CONTROLS ###
bind = $mainMod, c, killactive,
bind = $mainMod SHIFT, escape, exit,
bind = $mainMod SHIFT, q, exec, hyprlock
bind = $mainMod, v, togglefloating,
bind = $mainMod, p, exec, hyprshot -m window
bind = $mainMod SHIFT, p, exec, hyprshot -m region

# Clipboard history
bind = $mainMod SHIFT, v, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

### FOCUS WINDOW (vim-style, matches Aerospace) ###
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

### MOVE WINDOWS ###
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r

### RESIZE WINDOWS ###
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod ALT_L, h, resizeactive, -50 0
bind = $mainMod ALT_L, j, resizeactive, 0 50
bind = $mainMod ALT_L, k, resizeactive, 0 -50
bind = $mainMod ALT_L, l, resizeactive, 50 0

### WORKSPACES (matches Aerospace: mod+1-5) ###
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Workspace back and forth (like Aerospace tab)
bind = $mainMod, tab, workspace, previous

### MEDIA KEYS ###
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrulev2 = suppressevent maximize, class:.*
